              </div>
              <div class="form-group"><label class="form-label">运费</label><input type="number" class="form-input" id="wShip" placeholder="0" oninput="app.modules.calculator.calcW()"></div>
              <div class="form-group"><label class="form-label">包装费（单个）</label><input type="number" class="form-input" id="wPack" placeholder="2.00" oninput="app.modules.calculator.calcW()"></div>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                <div class="form-group"><label class="form-label">售价</label><input type="number" class="form-input" id="wPrice" placeholder="50" oninput="app.modules.calculator.calcW()"></div>
                <div class="form-group"><label class="form-label">月销量预估</label><input type="number" class="form-input" id="wMonthly" placeholder="50"></div>
              </div>
              <div class="card" style="background: var(--bg-input); margin-top: 12px;">
                <div style="font-size: 14px; line-height: 2;">
                  <div class="flex-between"><span style="color: var(--text-secondary);">产品总成本</span><span id="wProdCost">¥0.00</span></div>
                  <div class="flex-between"><span style="color: var(--text-secondary);">模具均摊</span><span id="wMoldUnit">¥0.00</span></div>
                  <div class="flex-between"><span style="color: var(--text-secondary);">包装成本</span><span id="wPackCost">¥0.00</span></div>
                  <div class="flex-between" style="padding-top: 8px; border-top: 1px solid var(--border-color); margin-top: 8px;"><span style="font-weight: 600;">单件总成本</span><span id="wTotal" style="font-weight: 600; color: var(--text-primary);">¥0.00</span></div>
                  <div class="flex-between"><span style="color: var(--text-secondary);">单件利润</span><span id="wProfit" style="color: #82e0aa;">¥0.00</span></div>
                  <div class="flex-between"><span style="color: var(--text-secondary);">利润率</span><span id="wRateP" style="color: #82e0aa;">0%</span></div>
                  <div class="flex-between" style="padding-top: 8px; border-top: 1px solid var(--border-color); margin-top: 8px;"><span style="color: var(--text-secondary);">月利润预估</span><span id="wMonProfit" style="font-weight: 700; color: var(--accent-silver-solid);">¥0.00</span></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="card" style="margin-top: 20px;">
          <div class="card-header"><h3 class="card-title">盈亏平衡点</h3></div>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px;">
            <div class="form-group" style="margin-bottom: 0;"><label class="form-label">固定成本（设备/模具等）</label><input type="number" class="form-input" id="beFixed" placeholder="1000" oninput="app.modules.calculator.calcBE()"></div>
            <div class="form-group" style="margin-bottom: 0;"><label class="form-label">单件售价</label><input type="number" class="form-input" id="bePrice" placeholder="150" oninput="app.modules.calculator.calcBE()"></div>
            <div class="form-group" style="margin-bottom: 0;"><label class="form-label">单件成本</label><input type="number" class="form-input" id="beCost" placeholder="50" oninput="app.modules.calculator.calcBE()"></div>
          </div>
          <div class="card" style="background: var(--bg-input);">
            <div style="text-align: center; padding: 20px;">
              <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">需要卖出 <span id="beUnits" style="font-size: 32px; font-weight: 700; color: var(--accent-silver-solid);">0</span> 件才能回本</div>
              <div style="font-size: 12px; color: var(--text-muted);">按当前售价和成本计算</div>
            </div>
          </div>
        </div>
      </div>
    `;
  },
  addMatRow(type) {
    const container = document.getElementById(type + 'Materials');
    const row = document.createElement('div');
    row.className = 'material-row';
    row.style.cssText = 'display: flex; gap: 8px; margin-bottom: 8px;';
    row.innerHTML = `<input type="text" class="form-input" style="flex: 2;" placeholder="材料名称" oninput="app.modules.calculator.calcH()"><input type="number" class="form-input" style="flex: 1;" placeholder="单价" oninput="app.modules.calculator.calcH()"><input type="number" class="form-input" style="flex: 1;" placeholder="用量" oninput="app.modules.calculator.calcH()"><button class="btn-icon" onclick="this.parentElement.remove(); app.modules.calculator.calcH()">x</button>`;
    container.appendChild(row);
  },
  calcH() {
    let matCost = 0;
    document.querySelectorAll('#hMaterials .material-row').forEach(row => {
      const inputs = row.querySelectorAll('input');
      const price = parseFloat(inputs[1]?.value) || 0;
      const qty = parseFloat(inputs[2]?.value) || 0;
      matCost += price * qty;
    });
    const time = parseFloat(document.getElementById('hTime')?.value) || 0;
    const rate = parseFloat(document.getElementById('hRate')?.value) || 0;
    const pack = parseFloat(document.getElementById('hPack')?.value) || 0;
    const price = parseFloat(document.getElementById('hPrice')?.value) || 0;
    const monthly = parseInt(document.getElementById('hMonthly')?.value) || 0;
    const labor = time * rate;
    const total = matCost + labor + pack;
    const profit = price - total;
    const profitRate = price > 0 ? ((profit / price) * 100).toFixed(1) : 0;
    document.getElementById('hMatCost').textContent = app.formatMoney(matCost);
    document.getElementById('hLabCost').textContent = app.formatMoney(labor);
    document.getElementById('hPackCost').textContent = app.formatMoney(pack);
    document.getElementById('hTotal').textContent = app.formatMoney(total);
    document.getElementById('hProfit').textContent = app.formatMoney(profit);
    document.getElementById('hRateP').textContent = profitRate + '%';
    document.getElementById('hMonProfit').textContent = app.formatMoney(profit * monthly);
  },
  calcW() {
    const unit = parseFloat(document.getElementById('wUnit')?.value) || 0;
    const qty = parseInt(document.getElementById('wQty')?.value) || 1;
    const mold = parseFloat(document.getElementById('wMold')?.value) || 0;
    const sample = parseFloat(document.getElementById('wSample')?.value) || 0;
    const ship = parseFloat(document.getElementById('wShip')?.value) || 0;
    const pack = parseFloat(document.getElementById('wPack')?.value) || 0;
    const price = parseFloat(document.getElementById('wPrice')?.value) || 0;
    const monthly = parseInt(document.getElementById('wMonthly')?.value) || 0;
    const prodCost = unit * qty + sample + ship;
    const moldUnit = qty > 0 ? mold / qty : 0;
    const total = unit + moldUnit + pack;
    const profit = price - total;
    const profitRate = price > 0 ? ((profit / price) * 100).toFixed(1) : 0;
    document.getElementById('wProdCost').textContent = app.formatMoney(prodCost);
    document.getElementById('wMoldUnit').textContent = app.formatMoney(moldUnit);
    document.getElementById('wPackCost').textContent = app.formatMoney(pack);
    document.getElementById('wTotal').textContent = app.formatMoney(total);
    document.getElementById('wProfit').textContent = app.formatMoney(profit);
    document.getElementById('wRateP').textContent = profitRate + '%';
    document.getElementById('wMonProfit').textContent = app.formatMoney(profit * monthly);
  },
  calcBE() {
    const fixed = parseFloat(document.getElementById('beFixed')?.value) || 0;
    const price = parseFloat(document.getElementById('bePrice')?.value) || 0;
    const cost = parseFloat(document.getElementById('beCost')?.value) || 0;
    const pp = price - cost;
    document.getElementById('beUnits').textContent = pp > 0 ? Math.ceil(fixed / pp) : 0;
  }
};

app.registerModule('calculator', calculatorModule);

</script>
<script>
const sopModule = {
  sops: [], editingId: null,
  async init() { await this.loadData(); this.bindEvents(); },
  async loadData() { this.sops = await db.getAll('sops'); this.renderList(); },
  bindEvents() {
    document.getElementById('addSOP')?.addEventListener('click', () => this.openForm());
    document.getElementById('searchSOP')?.addEventListener('input', (e) => this.filterList(e.target.value));
  },
  render() {
    return `
      <div class="animate-fade-in">
        <div class="flex-between" style="margin-bottom: 20px;">
          <div class="search-box" style="flex: 1; margin-bottom: 0; margin-right: 16px;"><input type="text" id="searchSOP" placeholder="搜索SOP流程..."></div>
          <button class="btn btn-primary" id="addSOP">新建SOP</button>
        </div>
        <div id="sopList" class="list-container">${this.renderListHTML()}</div>
      </div>
    `;
  },
  renderList() { const c = document.getElementById('sopList'); if (c) c.innerHTML = this.renderListHTML(); },
  renderListHTML() { if (this.sops.length === 0) return this.renderEmpty(); return this.sops.map(item => this.renderItem(item)).join(''); },
  renderEmpty() { return `<div class="empty-state"><h3>还没有SOP流程</h3><p>创建手工制作或批发定制的标准流程</p><button class="btn btn-primary" onclick="app.modules.sop.openForm()">创建SOP</button></div>`; },
  renderItem(item) {
    const typeMap = { handmade: '手工制品', wholesale: '批发定制' };
    const total = item.steps?.length || 0;
    const done = item.steps?.filter(s => s.completed).length || 0;
    const pct = total > 0 ? (done / total * 100).toFixed(0) : 0;
    return `
      <div class="card" style="margin-bottom: 12px; cursor: pointer;" onclick="app.modules.sop.openDetail(${item.id})">
        <div class="flex-between" style="margin-bottom: 12px;">
          <div>
            <div class="flex-gap" style="margin-bottom: 6px;"><h3 style="font-size: 15px; font-weight: 600;">${item.name}</h3><span class="tag tag-primary">${typeMap[item.type] || item.type}</span></div>
            <p style="font-size: 13px; color: var(--text-secondary);">${item.productName || '未关联产品'}</p>
          </div>
          <div style="text-align: right;"><div style="font-size: 24px; font-weight: 700; color: var(--accent-silver-solid);">${pct}%</div><div style="font-size: 12px; color: var(--text-muted);">${done}/${total} 步骤</div></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
      </div>
    `;
  },
  filterList(query) {
    const q = query.toLowerCase();
    const items = this.sops.filter(s => s.name?.toLowerCase().includes(q) || s.productName?.toLowerCase().includes(q));
    const c = document.getElementById('sopList');
    if (c) c.innerHTML = items.length ? items.map(item => this.renderItem(item)).join('') : this.renderEmpty();
  },
  openForm(id = null) {
    this.editingId = id;
    const item = id ? this.sops.find(s => s.id === id) : null;
    const defaultH = [
      { title: '绘制图案', desc: '在热缩片上绘制设计图案，使用彩铅或马克笔', time: '30分钟', completed: false },
      { title: '裁剪热缩片', desc: '沿图案轮廓裁剪，注意预留边缘', time: '10分钟', completed: false },
      { title: '热缩塑形', desc: '烤箱预热150度，放入热缩片观察收缩过程', time: '2-3分钟', completed: false },
      { title: '压平定型', desc: '取出后立即用重物压平，保持形状', time: '5分钟', completed: false },
      { title: '上UV胶', desc: '均匀涂抹UV胶，用紫外线灯固化', time: '15分钟', completed: false },
      { title: '打磨抛光', desc: '用砂纸从粗到细打磨，最后抛光', time: '20分钟', completed: false },
      { title: '质量检查', desc: '检查厚度均匀性、表面平整度、图案清晰度', time: '5分钟', completed: false },
      { title: '包装', desc: '装入拨片包或卡纸，贴标签', time: '5分钟', completed: false }
    ];
    const defaultW = [
      { title: '设计稿确认', desc: '确认AI矢量文件，标注尺寸和颜色', time: '1天', completed: false },
      { title: '厂家询价', desc: '向至少3家厂家询价，对比价格和质量', time: '2-3天', completed: false },
      { title: '打样确认', desc: '收到样品后检查质量，确认细节', time: '7-15天', completed: false },
      { title: '修改调整', desc: '根据样品反馈修改设计稿', time: '3-5天', completed: false },
      { title: '大货下单', desc: '确认数量、交期、付款方式后下单', time: '1天', completed: false },
      { title: '收货质检', desc: '抽检10%检查质量，记录不良率', time: '1天', completed: false },
      { title: '入库', desc: '分类上架，记录批次和数量', time: '半天', completed: false }
    ];
    const steps = item?.steps || (item?.type === 'wholesale' ? defaultW : defaultH);
    const content = `
      <form id="sopForm" onsubmit="event.preventDefault(); app.modules.sop.save();">
        <div class="form-group"><label class="form-label">SOP名称 *</label><input type="text" class="form-input" id="formName" value="${item?.name || ''}" placeholder="例如：热缩片拨片制作流程" required></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group">
            <label class="form-label">流程类型</label>
            <select class="form-select" id="formType" onchange="app.modules.sop.switchSteps(this.value)">
              <option value="handmade" ${item?.type === 'handmade' ? 'selected' : ''}>手工制品</option>
              <option value="wholesale" ${item?.type === 'wholesale' ? 'selected' : ''}>批发定制</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">关联产品</label><input type="text" class="form-input" id="formProductName" value="${item?.productName || ''}" placeholder="产品名称"></div>
        </div>
        <div class="form-group"><label class="form-label">流程说明</label><textarea class="form-textarea" id="formDesc" placeholder="流程的整体说明...">${item?.description || ''}</textarea></div>
        <div class="divider"></div>
        <div class="flex-between" style="margin-bottom: 12px;"><h4 style="font-size: 12px; font-weight: 600; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase;">步骤清单</h4><button class="btn btn-sm btn-secondary" onclick="app.modules.sop.addStep()">+ 添加步骤</button></div>
        <div id="stepsContainer" class="steps-container">${steps.map((step, i) => this.renderStepRow(step, i)).join('')}</div>
      </form>
    `;
    const footer = id
      ? `<button class="btn btn-danger" onclick="app.modules.sop.delete()">删除</button><div style="flex:1"></div><button class="btn btn-secondary" onclick="app.closeModal()">取消</button><button class="btn btn-primary" onclick="app.modules.sop.save()">保存</button>`
      : `<button class="btn btn-secondary" onclick="app.closeModal()">取消</button><button class="btn btn-primary" onclick="app.modules.sop.save()">创建</button>`;
    app.showModal(content, { title: id ? '编辑SOP' : '新建SOP', footer });
  },
  renderStepRow(step, index) {
    return `
      <div class="step-item" data-index="${index}">
        <div class="step-checkbox ${step.completed ? 'checked' : ''}" onclick="app.modules.sop.toggleStep(${index})">${step.completed ? '&#10003;' : ''}</div>
        <div class="step-content">
          <input type="text" class="form-input" style="font-weight: 600; margin-bottom: 6px;" value="${step.title}" placeholder="步骤标题" data-step="title">
          <textarea class="form-textarea" style="min-height: 50px; margin-bottom: 6px; font-size: 13px;" placeholder="步骤说明..." data-step="desc">${step.desc || ''}</textarea>
          <input type="text" class="form-input" style="width: 120px; font-size: 13px;" value="${step.time || ''}" placeholder="耗时" data-step="time">
        </div>
        <button class="btn-icon" onclick="this.closest('.step-item').remove(); app.modules.sop.renumberSteps();">x</button>
      </div>
    `;
  },
  addStep() {
    const container = document.getElementById('stepsContainer');
    const index = container.children.length;
    const div = document.createElement('div');
    div.innerHTML = this.renderStepRow({ title: '', desc: '', time: '', completed: false }, index);
    container.appendChild(div.firstElementChild);
  },
  toggleStep(index) {
    const item = document.querySelector(`#stepsContainer .step-item[data-index="${index}"]`);
    if (!item) return;
    const cb = item.querySelector('.step-checkbox');
    cb.classList.toggle('checked');
    cb.innerHTML = cb.classList.contains('checked') ? '&#10003;' : '';
  },
  renumberSteps() {
    document.querySelectorAll('#stepsContainer .step-item').forEach((item, i) => {
      item.dataset.index = i;
      item.querySelector('.step-checkbox').setAttribute('onclick', `app.modules.sop.toggleStep(${i})`);
    });
  },
  switchSteps(type) {
    const defaultH = [
      { title: '绘制图案', desc: '在热缩片上绘制设计图案，使用彩铅或马克笔', time: '30分钟', completed: false },
      { title: '裁剪热缩片', desc: '沿图案轮廓裁剪，注意预留边缘', time: '10分钟', completed: false },
      { title: '热缩塑形', desc: '烤箱预热150度，放入热缩片观察收缩过程', time: '2-3分钟', completed: false },
      { title: '压平定型', desc: '取出后立即用重物压平，保持形状', time: '5分钟', completed: false },
      { title: '上UV胶', desc: '均匀涂抹UV胶，用紫外线灯固化', time: '15分钟', completed: false },
      { title: '打磨抛光', desc: '用砂纸从粗到细打磨，最后抛光', time: '20分钟', completed: false },
      { title: '质量检查', desc: '检查厚度均匀性、表面平整度、图案清晰度', time: '5分钟', completed: false },
      { title: '包装', desc: '装入拨片包或卡纸，贴标签', time: '5分钟', completed: false }
    ];
    const defaultW = [
      { title: '设计稿确认', desc: '确认AI矢量文件，标注尺寸和颜色', time: '1天', completed: false },
      { title: '厂家询价', desc: '向至少3家厂家询价，对比价格和质量', time: '2-3天', completed: false },
      { title: '打样确认', desc: '收到样品后检查质量，确认细节', time: '7-15天', completed: false },
      { title: '修改调整', desc: '根据样品反馈修改设计稿', time: '3-5天', completed: false },
      { title: '大货下单', desc: '确认数量、交期、付款方式后下单', time: '1天', completed: false },
      { title: '收货质检', desc: '抽检10%检查质量，记录不良率', time: '1天', completed: false },
      { title: '入库', desc: '分类上架，记录批次和数量', time: '半天', completed: false }
    ];
    const steps = type === 'wholesale' ? defaultW : defaultH;
    document.getElementById('stepsContainer').innerHTML = steps.map((s, i) => this.renderStepRow(s, i)).join('');
  },
  async save() {
    const name = document.getElementById('formName').value.trim();
    if (!name) { app.showToast('请填写SOP名称'); return; }
    const steps = [];
    document.querySelectorAll('#stepsContainer .step-item').forEach(item => {
      steps.push({
        title: item.querySelector('[data-step="title"]').value,
        desc: item.querySelector('[data-step="desc"]').value,
        time: item.querySelector('[data-step="time"]').value,
        completed: item.querySelector('.step-checkbox').classList.contains('checked')
      });
    });
    const data = { name, type: document.getElementById('formType').value, productName: document.getElementById('formProductName').value, description: document.getElementById('formDesc').value, steps };
    try {
      if (this.editingId) { data.id = this.editingId; await db.update('sops', data); app.showToast('SOP已更新'); }
      else { await db.add('sops', data); app.showToast('SOP已创建'); }
      app.closeModal(); await this.loadData();
    } catch (err) { console.error(err); app.showToast('保存失败'); }
  },
  async delete() { if (!confirm('确定要删除这个SOP吗？')) return; try { await db.delete('sops', this.editingId); app.showToast('SOP已删除'); app.closeModal(); await this.loadData(); } catch (err) { app.showToast('删除失败'); } },
  openDetail(id) {
    const item = this.sops.find(s => s.id === id);
    if (!item) return;
    const typeMap = { handmade: '手工制品', wholesale: '批发定制' };
    const total = item.steps?.length || 0;
    const done = item.steps?.filter(s => s.completed).length || 0;
    const pct = total > 0 ? (done / total * 100).toFixed(0) : 0;
    const content = `
      <div style="margin-bottom: 20px;">
        <div class="flex-between" style="margin-bottom: 16px;">
          <div><h2 style="font-size: 18px; font-weight: 600; margin-bottom: 6px;">${item.name}</h2><div class="flex-gap"><span class="tag tag-primary">${typeMap[item.type] || item.type}</span><span style="font-size: 13px; color: var(--text-secondary);">${item.productName || '未关联产品'}</span></div></div>
          <div style="text-align: right;"><div style="font-size: 28px; font-weight: 700; color: var(--accent-silver-solid);">${pct}%</div><div style="font-size: 12px; color: var(--text-muted);">完成度</div></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
      </div>
      <div class="steps-container">${item.steps?.map((step, i) => `
        <div class="step-item" style="cursor: pointer;" onclick="app.modules.sop.toggleStepInDetail(${id}, ${i})">
          <div class="step-checkbox ${step.completed ? 'checked' : ''}">${step.completed ? '&#10003;' : ''}</div>
          <div class="step-content"><div class="step-title">${step.title}</div><div class="step-desc">${step.desc || ''}</div><div class="step-time">${step.time || '未设定'}</div></div>
        </div>
      `).join('') || '<p style="text-align: center; color: var(--text-muted); padding: 20px;">暂无步骤</p>'}</div>
    `;
    app.showModal(content, { title: 'SOP详情', footer: `<button class="btn btn-secondary" onclick="app.closeModal()">关闭</button><button class="btn btn-primary" onclick="app.modules.sop.openForm(${id})">编辑</button>` });
  },
  async toggleStepInDetail(sopId, stepIndex) {
    const item = this.sops.find(s => s.id === sopId);
    if (!item || !item.steps[stepIndex]) return;
    item.steps[stepIndex].completed = !item.steps[stepIndex].completed;
    try { await db.update('sops', item); await this.loadData(); } catch (err) { app.showToast('更新失败'); }
  }
};

app.registerModule('sop', sopModule);

</script>
<script>
const xiaohongshuModule = {
  contents: [], editingId: null,
  async init() { await this.loadData(); this.bindEvents(); },
  async loadData() { this.contents = await db.getAll('xiaohongshu'); this.renderList(); },
  bindEvents() {
    document.getElementById('addContent')?.addEventListener('click', () => this.openForm());
    document.getElementById('searchContent')?.addEventListener('input', (e) => this.filterList(e.target.value));
    document.getElementById('filterContentType')?.addEventListener('change', () => this.renderList());
  },
  render() {
    return `
      <div class="animate-fade-in">
        <div class="flex-between" style="margin-bottom: 20px;">
          <div class="search-box" style="flex: 1; margin-bottom: 0; margin-right: 16px;"><input type="text" id="searchContent" placeholder="搜索内容..."></div>
          <select class="form-select" id="filterContentType" style="width: 120px; margin-right: 12px;"><option value="">全部</option><option value="planned">计划中</option><option value="published">已发布</option><option value="draft">草稿</option></select>
          <button class="btn btn-primary" id="addContent">新增内容</button>
        </div>
        <div class="stats-row" style="margin-bottom: 20px;">
          <div class="stat-card"><div class="stat-label">已发布</div><div class="stat-value">${this.contents.filter(c => c.status === 'published').length}</div></div>
          <div class="stat-card"><div class="stat-label">计划中</div><div class="stat-value">${this.contents.filter(c => c.status === 'planned').length}</div></div>
          <div class="stat-card"><div class="stat-label">总点赞</div><div class="stat-value">${this.contents.reduce((s, c) => s + (c.likes || 0), 0)}</div></div>
          <div class="stat-card"><div class="stat-label">总收藏</div><div class="stat-value">${this.contents.reduce((s, c) => s + (c.favorites || 0), 0)}</div></div>
        </div>
        <div id="contentList" class="list-container">${this.renderListHTML()}</div>
      </div>
    `;
  },
  renderList() { const c = document.getElementById('contentList'); if (c) c.innerHTML = this.renderListHTML(); },
  renderListHTML() {
    const ft = document.getElementById('filterContentType')?.value || '';
    let items = this.contents; if (ft) items = items.filter(c => c.status === ft);
    items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    if (items.length === 0) return this.renderEmpty();
    return items.map(item => this.renderItem(item)).join('');
  },
  renderEmpty() { return `<div class="empty-state"><h3>还没有内容记录</h3><p>规划你的小红书内容日历</p><button class="btn btn-primary" onclick="app.modules.xiaohongshu.openForm()">添加内容</button></div>`; },
  renderItem(item) {
    const statusMap = { planned: { text: '计划中', cls: 'status-planning' }, published: { text: '已发布', cls: 'status-listed' }, draft: { text: '草稿', cls: 'status-idea' } };
    const s = statusMap[item.status] || statusMap.planned;
    const typeMap = { image: '图文', video: '视频' };
    return `
      <div class="list-item" onclick="app.modules.xiaohongshu.openForm(${item.id})">
        <div class="list-item-content">
          <div class="flex-between" style="margin-bottom: 6px;">
            <div class="flex-gap"><span class="status-badge ${s.cls}">${s.text}</span><span class="tag">${typeMap[item.type] || item.type}</span></div>
            <span style="font-size: 12px; color: var(--text-muted);">${item.publishDate || ''}</span>
          </div>
          <h3 class="list-item-title">${item.title}</h3>
          <p class="list-item-desc">${item.notes || ''}</p>
          <div class="list-item-meta">
            ${item.status === 'published' ? `<span class="tag tag-success">赞 ${item.likes || 0}</span><span class="tag tag-success">藏 ${item.favorites || 0}</span><span class="tag tag-success">评 ${item.comments || 0}</span><span class="tag">阅 ${item.views || 0}</span>` : ''}
            ${item.tags?.map(tag => `<span class="tag">#${tag}</span>`).join('') || ''}
          </div>
        </div>
        <div class="list-item-actions">${item.url ? `<button class="btn-icon" onclick="event.stopPropagation(); window.open('${item.url}', '_blank')">外链</button>` : ''}</div>
      </div>
    `;
  },
  filterList(query) {
    const q = query.toLowerCase();
    const items = this.contents.filter(c => c.title?.toLowerCase().includes(q) || c.notes?.toLowerCase().includes(q));
    const c = document.getElementById('contentList');
    if (c) c.innerHTML = items.length ? items.map(item => this.renderItem(item)).join('') : this.renderEmpty();
  },
  openForm(id = null) {
    this.editingId = id;
    const item = id ? this.contents.find(c => c.id === id) : null;
    const content = `
      <form id="xiaohongshuForm" onsubmit="event.preventDefault(); app.modules.xiaohongshu.save();">
        <div class="form-group"><label class="form-label">内容标题 *</label><input type="text" class="form-input" id="formTitle" value="${item?.title || ''}" placeholder="例如：手工心脏拨片制作全过程" required></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group"><label class="form-label">状态</label><select class="form-select" id="formStatus"><option value="planned" ${item?.status === 'planned' ? 'selected' : ''}>计划中</option><option value="draft" ${item?.status === 'draft' ? 'selected' : ''}>草稿</option><option value="published" ${item?.status === 'published' ? 'selected' : ''}>已发布</option></select></div>
          <div class="form-group"><label class="form-label">内容类型</label><select class="form-select" id="formType"><option value="image" ${item?.type === 'image' ? 'selected' : ''}>图文</option><option value="video" ${item?.type === 'video' ? 'selected' : ''}>视频</option></select></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group"><label class="form-label">计划发布日期</label><input type="date" class="form-input" id="formPublishDate" value="${item?.publishDate || ''}"></div>
          <div class="form-group"><label class="form-label">发布链接</label><input type="text" class="form-input" id="formUrl" value="${item?.url || ''}" placeholder="小红书链接"></div>
        </div>
        <div class="form-group"><label class="form-label">内容笔记/文案</label><textarea class="form-textarea" id="formNotes" placeholder="文案内容、选题思路...">${item?.notes || ''}</textarea></div>
        <div class="form-group"><label class="form-label">话题标签</label><input type="text" class="form-input" id="formTags" value="${item?.tags?.join(', ') || ''}" placeholder="吉他, 拨片, 手工, 热缩片"></div>
        <div class="divider"></div>
        <h4 style="font-size: 12px; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase;">数据跟踪</h4>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group"><label class="form-label">点赞数</label><input type="number" class="form-input" id="formLikes" value="${item?.likes || ''}" placeholder="0"></div>
          <div class="form-group"><label class="form-label">收藏数</label><input type="number" class="form-input" id="formFavorites" value="${item?.favorites || ''}" placeholder="0"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group"><label class="form-label">评论数</label><input type="number" class="form-input" id="formComments" value="${item?.comments || ''}" placeholder="0"></div>
          <div class="form-group"><label class="form-label">浏览量</label><input type="number" class="form-input" id="formViews" value="${item?.views || ''}" placeholder="0"></div>
        </div>
        <div class="form-group"><label class="form-label"><input type="checkbox" id="formIsHot" ${item?.isHot ? 'checked' : ''} style="margin-right: 8px;">标记为爆款笔记</label></div>
      </form>
    `;
    const footer = id
      ? `<button class="btn btn-danger" onclick="app.modules.xiaohongshu.delete()">删除</button><div style="flex:1"></div><button class="btn btn-secondary" onclick="app.closeModal()">取消</button><button class="btn btn-primary" onclick="app.modules.xiaohongshu.save()">保存</button>`
      : `<button class="btn btn-secondary" onclick="app.closeModal()">取消</button><button class="btn btn-primary" onclick="app.modules.xiaohongshu.save()">创建</button>`;
    app.showModal(content, { title: id ? '编辑内容' : '新增内容', footer });
  },
  async save() {
    const title = document.getElementById('formTitle').value.trim();
    if (!title) { app.showToast('请填写标题'); return; }
    const data = {
      title, status: document.getElementById('formStatus').value, type: document.getElementById('formType').value,
      publishDate: document.getElementById('formPublishDate').value, url: document.getElementById('formUrl').value,
      notes: document.getElementById('formNotes').value, tags: document.getElementById('formTags').value.split(',').map(t => t.trim()).filter(Boolean),
      likes: parseInt(document.getElementById('formLikes')?.value) || 0, favorites: parseInt(document.getElementById('formFavorites')?.value) || 0,
      comments: parseInt(document.getElementById('formComments')?.value) || 0, views: parseInt(document.getElementById('formViews')?.value) || 0,
      isHot: document.getElementById('formIsHot')?.checked || false
    };
    try { if (this.editingId) { data.id = this.editingId; await db.update('xiaohongshu', data); app.showToast('内容已更新'); } else { await db.add('xiaohongshu', data); app.showToast('内容已创建'); } app.closeModal(); await this.loadData(); }
    catch (err) { console.error(err); app.showToast('保存失败'); }
  },
  async delete() { if (!confirm('确定要删除这条内容吗？')) return; try { await db.delete('xiaohongshu', this.editingId); app.showToast('内容已删除'); app.closeModal(); await this.loadData(); } catch (err) { app.showToast('删除失败'); } }
};

app.registerModule('xiaohongshu', xiaohongshuModule);

</script>
<script>
/**
 * 竞品监控模块 - 小红书风格卡片 + AI分析
 */

const competitorModule = {
  competitors: [], editingId: null, currentImages: [],
  async init() { await this.loadData(); this.bindEvents(); },
  async loadData() { this.competitors = await db.getAll('competitors'); this.renderList(); },
  bindEvents() {
    document.getElementById('addCompetitor')?.addEventListener('click', () => this.openForm());
    document.getElementById('searchCompetitor')?.addEventListener('input', (e) => this.filterList(e.target.value));
  },
  render() {
    return `
      <div class="animate-fade-in">
        <div class="flex-between" style="margin-bottom: 20px;">
          <div class="search-box" style="flex: 1; margin-bottom: 0; margin-right: 16px;"><input type="text" id="searchCompetitor" placeholder="搜索竞品..."></div>
          <button class="btn btn-primary" id="addCompetitor">新增竞品</button>
        </div>
        <div id="competitorList" class="list-container">${this.renderListHTML()}</div>
      </div>
    `;
  },
  renderList() { const c = document.getElementById('competitorList'); if (c) c.innerHTML = this.renderListHTML(); },
  renderListHTML() { if (this.competitors.length === 0) return this.renderEmpty(); return this.competitors.map(item => this.renderItem(item)).join(''); },
  renderEmpty() { return `<div class="empty-state"><h3>还没有竞品记录</h3><p>记录你对标的店铺和账号，分析优劣势</p><button class="btn btn-primary" onclick="app.modules.competitor.openForm()">添加竞品</button></div>`; },

  // 分条解析优劣势文本
  parsePoints(text) {
    if (!text) return [];
    return text.split(/\n|\r/).map(line => line.trim()).filter(line => line.length > 0);
  },

  renderItem(item) {
    const strengths = this.parsePoints(item.strengths);
    const weaknesses = this.parsePoints(item.weaknesses);
    const hasAnalysis = strengths.length > 0 || weaknesses.length > 0;
    const avatar = item.images && item.images[0] ? item.images[0] : '';

    return `
      <div class="list-item competitor-card" data-id="${item.id}">
        <!-- 头部：头像 + 名称 + 平台 -->
        <div class="competitor-header" onclick="app.modules.competitor.toggleDetail(${item.id})">
          ${avatar ? `<img src="${avatar}" class="competitor-avatar" alt="">` : `<div class="competitor-avatar-placeholder">${item.name?.charAt(0) || '竞'}</div>`}
          <div class="competitor-info">
            <div class="competitor-title-row">
              <h3 class="competitor-name">${item.name}</h3>
              <span class="tag tag-primary platform-tag">${item.platform || '未知平台'}</span>
              <button class="btn btn-xs btn-ghost edit-btn-inline" onclick="event.stopPropagation(); app.modules.competitor.openForm(${item.id})" title="编辑">编辑</button>
            </div>
            <div class="competitor-stats">
              ${item.followers ? `<span class="stat-item"><b>${item.followers}</b> 粉丝</span>` : ''}
              ${item.likes ? `<span class="stat-item"><b>${item.likes}</b> 获赞</span>` : ''}
              ${item.following ? `<span class="stat-item"><b>${item.following}</b> 关注</span>` : ''}
            </div>
          </div>
          <div class="competitor-toggle-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
        </div>

        <!-- 中部：产品标签 + 价格 -->
        <div class="competitor-tags-row" onclick="app.modules.competitor.toggleDetail(${item.id})">
          ${item.priceRange ? `<span class="tag tag-price">${item.priceRange}</span>` : ''}
          ${item.productType ? `<span class="tag">${item.productType}</span>` : ''}
          ${item.mainProducts ? item.mainProducts.split(/[,，]/).map(p => p.trim() ? `<span class="tag tag-gray">${p.trim()}</span>` : '').join('') : ''}
        </div>

        <!-- 展开详情：优劣势 + 操作 -->
        <div class="competitor-detail" id="comp-detail-${item.id}" style="display: none;">
          ${strengths.length > 0 ? `
            <div class="detail-section">
              <div class="detail-title">优势</div>
              <ul class="detail-list detail-strength">
                ${strengths.map(s => `<li>${s}</li>`).join('')}
              </ul>
            </div>
          ` : ''}
          ${weaknesses.length > 0 ? `
            <div class="detail-section">
              <div class="detail-title">劣势 / 可超越点</div>
              <ul class="detail-list detail-weakness">
                ${weaknesses.map(w => `<li>${w}</li>`).join('')}
              </ul>
            </div>
          ` : ''}
          ${!hasAnalysis ? `<div class="detail-empty">暂无优劣势分析，点击编辑添加</div>` : ''}

          <div class="competitor-actions">
            ${item.url ? `<a class="btn btn-sm btn-secondary" href="${item.url}" target="_blank" onclick="event.stopPropagation()">查看店铺</a>` : ''}
            <button class="btn btn-sm btn-ai" onclick="event.stopPropagation(); app.modules.competitor.openAIAnalyze(${item.id})">AI 分析</button>
            <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation(); app.modules.competitor.openForm(${item.id})">编辑</button>
          </div>
        </div>
      </div>
    `;
  },

  toggleDetail(id) {
    const detail = document.getElementById(`comp-detail-${id}`);
    const card = document.querySelector(`.competitor-card[data-id="${id}"]`);
    if (!detail || !card) return;
    const isOpen = detail.style.display !== 'none';
    detail.style.display = isOpen ? 'none' : 'block';
    card.classList.toggle('expanded', !isOpen);
  },

  openAIAnalyze(id) {
    const item = this.competitors.find(c => c.id === id);
    if (!item) return;
    const prompt = `请帮我分析竞品「${item.name}」，平台：${item.platform || '未知'}，产品类型：${item.productType || '未知'}，价格区间：${item.priceRange || '未知'}，粉丝：${item.followers || '未知'}。\n\n现有优势：${item.strengths || '暂无'}\n\n现有劣势：${item.weaknesses || '暂无'}\n\n请帮我：1. 补充更多优劣势分析；2. 给出我该如何差异化竞争的建议；3. 分析定价策略是否合理。`;
    const encoded = encodeURIComponent(prompt);
    window.open(`https://kimi.moonshot.cn/?q=${encoded}`, '_blank');
  },

  filterList(query) {
    const q = query.toLowerCase();
    const items = this.competitors.filter(c => c.name?.toLowerCase().includes(q) || c.platform?.toLowerCase().includes(q));
    const c = document.getElementById('competitorList');
    if (c) c.innerHTML = items.length ? items.map(item => this.renderItem(item)).join('') : this.renderEmpty();
  },
  openForm(id = null) {
    this.editingId = id;
    const item = id ? this.competitors.find(c => c.id === id) : null;
    this.currentImages = item?.images ? [...item.images] : [];
    const content = `
      <form id="competitorForm" onsubmit="event.preventDefault(); app.modules.competitor.save();">
        <div class="form-group"><label class="form-label">竞品名称 *</label><input type="text" class="form-input" id="formName" value="${item?.name || ''}" placeholder="店铺/账号名称" required></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group"><label class="form-label">平台</label><select class="form-select" id="formPlatform"><option value="小红书" ${item?.platform === '小红书' ? 'selected' : ''}>小红书</option><option value="淘宝" ${item?.platform === '淘宝' ? 'selected' : ''}>淘宝</option><option value="抖音" ${item?.platform === '抖音' ? 'selected' : ''}>抖音</option><option value="其他" ${item?.platform === '其他' ? 'selected' : ''}>其他</option></select></div>
          <div class="form-group"><label class="form-label">产品类型</label><input type="text" class="form-input" id="formProductType" value="${item?.productType || ''}" placeholder="例如：拨片"></div>
        </div>
        <div class="form-group"><label class="form-label">链接</label><input type="text" class="form-input" id="formUrl" value="${item?.url || ''}" placeholder="店铺/账号链接"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
          <div class="form-group"><label class="form-label">粉丝数</label><input type="text" class="form-input" id="formFollowers" value="${item?.followers || ''}" placeholder="例如：1.2w"></div>
          <div class="form-group"><label class="form-label">获赞数</label><input type="text" class="form-input" id="formLikes" value="${item?.likes || ''}" placeholder="例如：20w"></div>
          <div class="form-group"><label class="form-label">关注数</label><input type="text" class="form-input" id="formFollowing" value="${item?.following || ''}" placeholder="例如：152"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group"><label class="form-label">价格区间</label><input type="text" class="form-input" id="formPriceRange" value="${item?.priceRange || ''}" placeholder="例如：50-150元"></div>
          <div class="form-group"><label class="form-label">主打产品</label><input type="text" class="form-input" id="formMainProducts" value="${item?.mainProducts || ''}" placeholder="例如：异形拨片、定制拨片"></div>
        </div>
        <div class="form-group"><label class="form-label">优势分析（每行一条）</label><textarea class="form-textarea" id="formStrengths" placeholder="例如：\n设计独特，原创图案\n包装精美，有品牌感\n粉丝互动率高">${item?.strengths || ''}</textarea></div>
        <div class="form-group"><label class="form-label">劣势 / 可超越点（每行一条）</label><textarea class="form-textarea" id="formWeaknesses" placeholder="例如：\n价格偏高，可以打性价比\n缺少异形拨片品类\n发货慢">${item?.weaknesses || ''}</textarea></div>
        <div class="form-group">
          <label class="form-label">店铺头像 / 截图</label>
          <div class="image-upload" onclick="document.getElementById('formImages').click()"><input type="file" id="formImages" accept="image/*" multiple onchange="app.modules.competitor.handleImageUpload(this)"><div style="font-size: 13px; color: var(--text-muted);">点击上传（第一张将作为头像）</div></div>
          <div class="image-preview" id="imagePreview">${this.currentImages.map(img => `<img src="${img}" class="image-preview-item" onclick="event.stopPropagation(); app.viewImage('${img}')">`).join('')}</div>
        </div>
      </form>
    `;
    const footer = id
      ? `<button class="btn btn-danger" onclick="app.modules.competitor.delete()">删除</button><div style="flex:1"></div><button class="btn btn-secondary" onclick="app.closeModal()">取消</button><button class="btn btn-primary" onclick="app.modules.competitor.save()">保存</button>`
      : `<button class="btn btn-secondary" onclick="app.closeModal()">取消</button><button class="btn btn-primary" onclick="app.modules.competitor.save()">创建</button>`;
    app.showModal(content, { title: id ? '编辑竞品' : '新增竞品', footer });
  },
  async handleImageUpload(input) {
    const files = Array.from(input.files);
    const preview = document.getElementById('imagePreview');
    for (const file of files) {
      const base64 = await app.fileToBase64(file);
      this.currentImages.push(base64);
      const img = document.createElement('img'); img.src = base64; img.className = 'image-preview-item';
      img.onclick = (e) => { e.stopPropagation(); app.viewImage(base64); };
      preview.appendChild(img);
    }
    input.value = '';
  },
  async save() {
    const name = document.getElementById('formName').value.trim();
    if (!name) { app.showToast('请填写名称'); return; }
    const data = {
      name,
      platform: document.getElementById('formPlatform').value,
      productType: document.getElementById('formProductType').value,
      url: document.getElementById('formUrl').value,
      followers: document.getElementById('formFollowers').value,
      likes: document.getElementById('formLikes').value,
      following: document.getElementById('formFollowing').value,
      priceRange: document.getElementById('formPriceRange').value,
      mainProducts: document.getElementById('formMainProducts').value,
      strengths: document.getElementById('formStrengths').value,
      weaknesses: document.getElementById('formWeaknesses').value,
      images: this.currentImages || []
    };
    try { if (this.editingId) { data.id = this.editingId; await db.update('competitors', data); app.showToast('竞品已更新'); } else { await db.add('competitors', data); app.showToast('竞品已创建'); } app.closeModal(); await this.loadData(); }
    catch (err) { console.error(err); app.showToast('保存失败'); }
  },
  async delete() { if (!confirm('确定要删除吗？')) return; try { await db.delete('competitors', this.editingId); app.showToast('已删除'); app.closeModal(); await this.loadData(); } catch (err) { app.showToast('删除失败'); } }
};

app.registerModule('competitor', competitorModule);

</script>
