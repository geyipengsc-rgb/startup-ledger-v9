<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>创业小账本</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <!-- Supabase 客户端 - 本地加载，不依赖外部 CDN -->
    <!-- Supabase 已内联 -->
</head>
<body>
    <div id="app">
        <!-- 桌面侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-text">创业小账本</span>
                </div>
                <div class="logo-sub">吉他饰品创业助手</div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <a href="#inspiration" class="nav-item active" data-module="inspiration">灵感库</a>
                <a href="#product" class="nav-item" data-module="product">产品设计</a>
                <a href="#supplier" class="nav-item" data-module="supplier">供应商</a>
                <a href="#calculator" class="nav-item" data-module="calculator">成本计算</a>
                <a href="#sop" class="nav-item" data-module="sop">生产SOP</a>
                <a href="#xiaohongshu" class="nav-item" data-module="xiaohongshu">小红书运营</a>
                <a href="#competitor" class="nav-item" data-module="competitor">竞品监控</a>
                <a href="#ai" class="nav-item" data-module="ai">AI助手</a>
            </nav>
            <div class="sidebar-footer">
                <div class="sync-status" id="syncStatus"></div>
                <button class="btn-text" id="syncBtn" style="display:none;" onclick="app.manualSync()">手动同步</button>
                <button class="btn-text" id="loginBtn" onclick="app.showLoginScreen()">登录云端</button>
                <button class="btn-text" id="logoutBtn" style="display:none;" onclick="app.handleLogout()">退出登录</button>
                <button class="btn-text" onclick="app.exportData()">导出数据</button>
                <button class="btn-text" onclick="app.importData()">导入数据</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" id="menuToggle">&#9776;</button>
                <h1 class="page-title" id="pageTitle">灵感库</h1>
                <div class="top-actions">
                    <button class="btn-ghost" onclick="app.openAI('pricing')">AI定价</button>
                    <button class="btn-ghost" onclick="app.openAI('copywriting')">AI文案</button>
                </div>
            </header>

            <div class="content-wrapper" id="contentWrapper">
                <div class="loading-screen">
                    <div class="loading-spinner"></div>
                    <p>正在加载...</p>
                </div>
            </div>
        </main>

        <!-- 移动端底部导航 -->
        <nav class="bottom-nav" id="bottomNav">
            <a href="#inspiration" class="nav-item active" data-module="inspiration">灵感</a>
            <a href="#competitor" class="nav-item" data-module="competitor">竞品</a>
            <a href="#supplier" class="nav-item" data-module="supplier">供应商</a>
            <a href="#product" class="nav-item" data-module="product">设计</a>
            <a href="#more" class="nav-item" id="moreNav">更多</a>
        </nav>

        <!-- 更多菜单弹窗 -->
        <div class="modal" id="moreModal">
            <div class="modal-overlay" onclick="app.closeMoreModal()"></div>
            <div class="modal-dialog more-menu">
                <a href="#calculator" class="menu-item" data-module="calculator">成本计算</a>
                <a href="#sop" class="menu-item" data-module="sop">生产SOP</a>
                <a href="#xiaohongshu" class="menu-item" data-module="xiaohongshu">小红书运营</a>
                <a href="#ai" class="menu-item" data-module="ai">AI助手</a>
                <div class="menu-divider"></div>
                <button class="menu-item" onclick="app.exportData(); app.closeMoreModal()">导出数据</button>
                <button class="menu-item" onclick="app.importData(); app.closeMoreModal()">导入数据</button>
                <button class="menu-item" onclick="app.closeMoreModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- 全局模态框 -->
    <div class="modal" id="globalModal">
        <div class="modal-overlay" onclick="app.closeModal()"></div>
        <div class="modal-dialog" id="modalDialog">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle"></h3>
                <button class="modal-close" onclick="app.closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- 图片查看器 -->
    <div class="image-viewer" id="imageViewer" onclick="this.style.display='none'">
        <img src="" alt="查看图片" id="viewerImage">
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 隐藏的文件输入用于导入 -->
    <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="app.handleImport(this)">

    <!-- 登录覆盖层 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-panel">
            <div class="login-header">
                <h2 id="loginTitle">登录</h2>
                <p>云端同步，多端数据互通</p>
            </div>
            <div id="loginForm">
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="输入密码">
                </div>
                <button class="btn btn-primary btn-full" onclick="app.handleLogin()" style="margin-bottom: 12px;">登录</button>
                <div class="login-links">
                    <button class="btn-link" onclick="app.showRegister()">注册新账号</button>
                </div>
            </div>
            <div id="registerForm" style="display:none;">
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="regEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="regPassword" placeholder="至少6位">
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input type="password" class="form-input" id="regConfirm" placeholder="再次输入">
                </div>
                <button class="btn btn-primary btn-full" onclick="app.handleRegister()" style="margin-bottom: 12px;">注册</button>
                <div class="login-links">
                    <button class="btn-link" onclick="app.showLoginForm()">已有账号，去登录</button>
                </div>
            </div>
            <button class="btn btn-secondary btn-full" onclick="app.hideLoginScreen()" style="margin-top: 16px;">暂不登录，本地使用</button>
        </div>
    </div>


    <!-- JS 内联（单文件应用，无缓存问题） -->

<script>
/**
 * 数据库管理模块 - IndexedDB + Supabase 云端同步
 * 离线优先：先本地，后同步云端
 */

const db = {
  dbName: 'StartupLedgerDB',
  dbVersion: 1,
  db: null,
  supabase: null,
  syncEnabled: false,
  syncUrl: null,
  syncKey: null,
  lastSync: 0,

  // ========== IndexedDB 基础 ==========
  async init() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(this.dbName, this.dbVersion);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        this.db = request.result;
        console.log('IndexedDB 连接成功');
        // 不再自动初始化 Supabase，改为用户点击登录时手动初始化
        // 避免页面加载时触发网络请求导致在国内网络卡住
        resolve(this.db);
      };
      request.onupgradeneeded = (event) => {
        const database = event.target.result;
        this.createStore(database, 'inspirations', ['status', 'priority', 'createdAt']);
        this.createStore(database, 'products', ['status', 'category']);
        this.createStore(database, 'suppliers', ['type', 'rating']);
        this.createStore(database, 'costs', ['productId', 'type']);
        this.createStore(database, 'sops', ['productId', 'type']);
        this.createStore(database, 'xiaohongshu', ['status', 'type', 'publishDate']);
        this.createStore(database, 'competitors', ['platform', 'productType']);
        this.createStore(database, 'orders', ['status', 'date']);
        this.createStore(database, 'finance', ['type', 'date', 'category']);
        this.createStore(database, 'logs', ['date', 'type']);
      };
    });
  },

  createStore(db, name, indexes) {
    if (db.objectStoreNames.contains(name)) return;
    const store = db.createObjectStore(name, { keyPath: 'id', autoIncrement: true });
    indexes.forEach(idx => store.createIndex(idx, idx, { unique: false }));
  },

  add(storeName, data) {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction([storeName], 'readwrite');
      const store = tx.objectStore(storeName);
      data.createdAt = new Date().toISOString();
      data.updatedAt = new Date().toISOString();
      const req = store.add(data);
      req.onsuccess = () => {
        this.scheduleSync();
        resolve(req.result);
      };
      req.onerror = () => reject(req.error);
    });
  },

  get(storeName, id) {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction([storeName], 'readonly');
      const req = tx.objectStore(storeName).get(id);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },

  getAll(storeName) {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction([storeName], 'readonly');
      const req = tx.objectStore(storeName).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  },

  update(storeName, data) {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction([storeName], 'readwrite');
      data.updatedAt = new Date().toISOString();
      const req = tx.objectStore(storeName).put(data);
      req.onsuccess = () => {
        this.scheduleSync();
        resolve(req.result);
      };
      req.onerror = () => reject(req.error);
    });
  },

  delete(storeName, id) {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction([storeName], 'readwrite');
      const req = tx.objectStore(storeName).delete(id);
      req.onsuccess = () => {
        this.scheduleSync();
        resolve();
      };
      req.onerror = () => reject(req.error);
    });
  },

  async exportAll() {
    const stores = ['inspirations', 'products', 'suppliers', 'costs', 'sops', 'xiaohongshu', 'competitors', 'orders', 'finance', 'logs'];
    const data = {};
    for (const store of stores) data[store] = await this.getAll(store);
    return data;
  },

  async importAll(data) {
    const stores = ['inspirations', 'products', 'suppliers', 'costs', 'sops', 'xiaohongshu', 'competitors', 'orders', 'finance', 'logs'];
    for (const store of stores) {
      if (data[store] && Array.isArray(data[store])) {
        const tx = this.db.transaction([store], 'readwrite');
        const objStore = tx.objectStore(store);
        await new Promise((res, rej) => {
          const clearReq = objStore.clear();
          clearReq.onsuccess = res;
          clearReq.onerror = rej;
        });
        for (const item of data[store]) {
          await new Promise((res, rej) => {
            const req = objStore.add(item);
            req.onsuccess = res;
            req.onerror = rej;
          });
        }
      }
    }
  },

  // ========== Supabase 云端同步 ==========

  initSupabase(url, key) {
    if (!url || !key) return false;
    this.syncUrl = url;
    this.syncKey = key;
    try {
      if (typeof supabase !== 'undefined' && supabase.createClient) {
        this.supabase = supabase.createClient(url, key, {
          auth: { persistSession: true, autoRefreshToken: false, detectSessionInUrl: false }
        });
        this.syncEnabled = true;
        console.log('Supabase 初始化成功');
        return true;
      }
    } catch (e) {
      console.error('Supabase 初始化失败:', e);
    }
    return false;
  },

  isLoggedIn() {
    return this.syncEnabled && this.supabase && this.supabase.auth?.getSession;
  },

  async getSession() {
    if (!this.isLoggedIn()) return null;
    try {
      const { data, error } = await this.supabase.auth.getSession();
      if (error) throw error;
      return data?.session;
    } catch (e) {
      console.error('获取会话失败:', e);
      return null;
    }
  },

  syncTimer: null,
  scheduleSync() {
    if (this.syncTimer) clearTimeout(this.syncTimer);
    this.syncTimer = setTimeout(() => this.syncToCloud(), 3000);
  },

  async syncToCloud() {
    const session = await this.getSession();
    if (!session) return;
    try {
      const data = await this.exportAll();
      const { error } = await this.supabase
        .from('user_data')
        .upsert({
          user_id: session.user.id,
          data: data,
          updated_at: new Date().toISOString()
        }, { onConflict: 'user_id' });
      if (error) throw error;
      this.lastSync = Date.now();
      console.log('云端同步成功');
      if (window.app) app.showSyncStatus('已同步');
    } catch (e) {
      console.error('云端同步失败:', e);
      if (window.app) app.showSyncStatus('同步失败');
    }
  },

  async syncFromCloud() {
    const session = await this.getSession();
    if (!session) return false;
    try {
      const { data, error } = await this.supabase
        .from('user_data')
        .select('data, updated_at')
        .eq('user_id', session.user.id)
        .single();
      if (error) {
        if (error.code === 'PGRST116') {
          console.log('云端暂无数据');
          return false;
        }
        throw error;
      }
      if (data?.data) {
        await this.importAll(data.data);
        this.lastSync = Date.now();
        console.log('从云端恢复数据成功');
        if (window.app) app.showSyncStatus('已同步');
        return true;
      }
      return false;
    } catch (e) {
      console.error('从云端恢复失败:', e);
      return false;
    }
  },

  async signUp(email, password) {
    if (!this.supabase) throw new Error('Supabase 未配置');
    const { data, error } = await this.supabase.auth.signUp({ email, password });
    if (error) throw error;
    return data;
  },

  async signIn(email, password) {
    if (!this.supabase) throw new Error('Supabase 未配置');
    const { data, error } = await this.supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    return data;
  },

  async signOut() {
    if (!this.supabase) return;
    await this.supabase.auth.signOut();
  }
};
</script>
<script>
/**
 * 创业小账本 - 核心应用框架
 * 管理路由、模块注册、UI交互、登录同步
 */

(function() {
  'use strict';

  const app = {
    modules: {},
    currentModule: null,
    db: null,

    // 初始化应用
    async init() {
      try {
        // 初始化数据库
        if (typeof db !== 'undefined' && db.init) {
          this.db = db;
          await db.init();
          console.log('数据库初始化成功');
        } else {
          console.warn('数据库模块未加载');
        }

        // 检查是否已配置 Supabase
        this.checkSupabaseConfig();

        // 绑定导航事件
        this.bindNavigation();

        // 绑定菜单切换
        const menuToggle = document.getElementById('menuToggle');
        if (menuToggle) {
          menuToggle.addEventListener('click', () => this.toggleSidebar());
        }

        // 绑定更多菜单
        const moreNav = document.getElementById('moreNav');
        if (moreNav) {
          moreNav.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            this.openMoreModal();
          });
        }

        // 处理初始路由
        this.handleRoute();

        // 监听hash变化
        window.addEventListener('hashchange', () => this.handleRoute());

        console.log('应用初始化完成');
      } catch (err) {
        console.error('应用初始化失败:', err);
        document.getElementById('contentWrapper').innerHTML = `
          <div class="empty-state">
            <h3>加载失败</h3>
            <p>${err.message}</p>
            <button class="btn btn-primary" onclick="location.reload()">刷新页面</button>
          </div>
        `;
      }
    },

    // 检查并初始化 Supabase（延迟到用户点击登录时）
    checkSupabaseConfig() {
      // 不再自动检查，避免页面加载时触发网络请求
      // Supabase 将在用户点击登录时初始化
      this.updateLoginUI(false);
    },

    // 检查登录状态
    async checkLoginStatus() {
      const session = await db.getSession();
      if (session) {
        this.showSyncStatus('同步中...');
        const synced = await db.syncFromCloud();
        if (synced) {
          this.showSyncStatus('已同步');
          // 刷新当前模块
          if (this.currentModule) {
            await this.loadModule(this.currentModule);
          }
        } else {
          this.showSyncStatus('已登录');
        }
        this.updateLoginUI(true);
      } else {
        this.updateLoginUI(false);
      }
    },

    // 注册模块
    registerModule(name, module) {
      this.modules[name] = module;
      console.log(`模块注册: ${name}`);
    },

    // 绑定导航事件
    bindNavigation() {
      document.querySelectorAll('.sidebar-nav .nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          const moduleName = item.dataset.module;
          if (moduleName) {
            this.navigate(moduleName);
            this.closeSidebar();
          }
        });
      });

      document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (item.id === 'moreNav') return;
          e.preventDefault();
          const moduleName = item.dataset.module;
          if (moduleName) {
            this.navigate(moduleName);
          }
        });
      });
    },

    // 导航到指定模块
    navigate(moduleName) {
      window.location.hash = moduleName;
    },

    // 处理路由
    async handleRoute() {
      const hash = window.location.hash.slice(1) || 'inspiration';
      const moduleName = hash.split('?')[0];
      this.updateNavState(moduleName);
      await this.loadModule(moduleName);
    },

    // 更新导航状态
    updateNavState(moduleName) {
      document.querySelectorAll('.sidebar-nav .nav-item').forEach(item => {
        item.classList.toggle('active', item.dataset.module === moduleName);
      });
      document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
        if (item.id === 'moreNav') return;
        item.classList.toggle('active', item.dataset.module === moduleName);
      });
      const titles = {
        inspiration: '灵感库', product: '产品设计', supplier: '供应商',
        calculator: '成本计算', sop: '生产SOP', xiaohongshu: '小红书运营',
        competitor: '竞品监控', ai: 'AI助手'
      };
      const titleEl = document.getElementById('pageTitle');
      if (titleEl) titleEl.textContent = titles[moduleName] || moduleName;
    },

    // 加载模块内容
    async loadModule(moduleName) {
      const wrapper = document.getElementById('contentWrapper');
      if (!wrapper) return;

      const module = this.modules[moduleName];
      if (!module) {
        wrapper.innerHTML = `
          <div class="empty-state">
            <h3>模块加载中...</h3>
            <p>请稍候，或刷新页面重试</p>
          </div>
        `;
        return;
      }

      this.currentModule = moduleName;

      try {
        if (module.render) {
          const html = module.render();
          wrapper.innerHTML = html;
        } else {
          wrapper.innerHTML = `<div class="empty-state"><h3>模块内容未定义</h3></div>`;
        }
        if (module.init) {
          await module.init();
        }
      } catch (err) {
        console.error(`模块加载失败: ${moduleName}`, err);
        wrapper.innerHTML = `
          <div class="empty-state">
            <h3>加载失败</h3>
            <p>模块 ${moduleName} 加载出错</p>
          </div>
        `;
      }
    },

    // 侧边栏切换
    toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (sidebar) sidebar.classList.toggle('open');
    },
    closeSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (sidebar) sidebar.classList.remove('open');
    },

    // 更多菜单
    openMoreModal() {
      const modal = document.getElementById('moreModal');
      if (modal) modal.classList.add('active');
    },
    closeMoreModal() {
      const modal = document.getElementById('moreModal');
      if (modal) modal.classList.remove('active');
    },

    // 全局模态框
    showModal(content, options = {}) {
      const modal = document.getElementById('globalModal');
      const titleEl = document.getElementById('modalTitle');
      const bodyEl = document.getElementById('modalBody');
      const footerEl = document.getElementById('modalFooter');
      if (!modal || !bodyEl) return;
      if (titleEl) titleEl.textContent = options.title || '';
      bodyEl.innerHTML = content || '';
      if (footerEl) footerEl.innerHTML = options.footer || '';
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    },
    closeModal() {
      const modal = document.getElementById('globalModal');
      if (modal) modal.classList.remove('active');
      document.body.style.overflow = '';
    },

    // Toast提示
    showToast(message) {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    },

    // 同步状态显示
    showSyncStatus(text) {
      const el = document.getElementById('syncStatus');
      if (el) {
        el.textContent = text;
        el.style.opacity = '1';
        if (text === '已同步') {
          setTimeout(() => { el.style.opacity = '0'; }, 3000);
        }
      }
    },

    // 图片查看
    viewImage(src) {
      const viewer = document.getElementById('imageViewer');
      const img = document.getElementById('viewerImage');
      if (viewer && img) {
        img.src = src;
        viewer.style.display = 'flex';
      }
    },

    // 文件转Base64
    fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    },

    // 导出数据
    async exportData() {
      try {
        if (!this.db) { this.showToast('数据库未初始化'); return; }
        const data = await this.db.exportAll();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `创业小账本_${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        this.showToast('数据已导出');
      } catch (err) {
        console.error('导出失败:', err);
        this.showToast('导出失败');
      }
    },

    // 导入数据
    importData() {
      const input = document.getElementById('importFileInput');
      if (input) input.click();
    },
    async handleImport(input) {
      const file = input.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!this.db) { this.showToast('数据库未初始化'); return; }
        await this.db.importAll(data);
        this.showToast('数据导入成功');
        if (this.currentModule) await this.loadModule(this.currentModule);
      } catch (err) {
        console.error('导入失败:', err);
        this.showToast('导入失败，请检查文件格式');
      }
      input.value = '';
    },

    // 格式化金额
    formatMoney(amount) {
      if (amount === undefined || amount === null) return '0.00';
      return parseFloat(amount).toFixed(2);
    },

    // 格式化日期
    formatDate(dateStr, format = 'full') {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      if (isNaN(date.getTime())) return '';
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      if (format === 'MM-DD') return `${month}-${day}`;
      return `${year}-${month}-${day}`;
    },

    // AI快捷入口
    openAI(type) {
      this.navigate('ai');
      setTimeout(() => {
        if (this.modules.ai && this.modules.ai.openAI) {
          this.modules.ai.openAI(type);
        }
      }, 100);
    },

    // ========== 登录相关 ==========

    showLoginScreen() {
      // 点击登录时初始化 Supabase（避免页面加载时触发网络请求）
      if (!db.syncEnabled) {
        db.initSupabase('https://lpesjfbczkuelyawfcd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwZXNqZmJjemt1ZWxveWF3ZmNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTM3MzMsImV4cCI6MjA5ODk4OTczM30.fS4VbgyyPKzR910wP9J7YtwKmXvKYKhqriW1jaiFM9E');
      }
      const overlay = document.getElementById('loginOverlay');
      if (overlay) {
        this.showLoginForm();
        overlay.classList.add('active');
      }
    },
    hideLoginScreen() {
      const overlay = document.getElementById('loginOverlay');
      if (overlay) overlay.classList.remove('active');
    },

    showRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.getElementById('loginTitle').textContent = '注册账号';
    },
    showLoginForm() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('loginTitle').textContent = '登录';
    },

    async handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) { this.showToast('请填写邮箱和密码'); return; }
      if (typeof supabase === 'undefined' || !db.supabase) {
        this.showToast('云端服务加载失败，请刷新页面重试');
        return;
      }
      this.showToast('正在登录...');
      try {
        await db.signIn(email, password);
        this.showToast('登录成功');
        this.hideLoginScreen();
        this.updateLoginUI(true);
        await db.syncFromCloud();
        if (this.currentModule) await this.loadModule(this.currentModule);
      } catch (err) {
        console.error('登录失败:', err);
        this.showToast('登录失败: ' + (err.message || '请检查邮箱密码'));
      }
    },

    async handleRegister() {
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      if (!email || !password) { this.showToast('请填写邮箱和密码'); return; }
      if (password !== confirm) { this.showToast('两次密码不一致'); return; }
      if (password.length < 6) { this.showToast('密码至少6位'); return; }
      if (typeof supabase === 'undefined' || !db.supabase) {
        this.showToast('云端服务加载失败，请刷新页面重试');
        console.error('Supabase 未加载: typeof supabase=' + typeof supabase + ', db.supabase=' + db.supabase);
        return;
      }
      this.showToast('正在注册...');
      try {
        await db.signUp(email, password);
        this.showToast('注册成功，请登录');
        this.showLoginForm();
      } catch (err) {
        console.error('注册失败:', err);
        this.showToast('注册失败: ' + (err.message || '请检查网络后重试'));
      }
    },

    async handleLogout() {
      if (!confirm('确定要退出登录吗？')) return;
      try {
        await db.signOut();
        this.showToast('已退出登录');
        this.updateLoginUI(false);
      } catch (err) {
        this.showToast('退出失败');
      }
    },

    updateLoginUI(isLoggedIn) {
      const loginBtn = document.getElementById('loginBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const syncBtn = document.getElementById('syncBtn');
      if (loginBtn) loginBtn.style.display = isLoggedIn ? 'none' : 'block';
      if (logoutBtn) logoutBtn.style.display = isLoggedIn ? 'block' : 'none';
      if (syncBtn) syncBtn.style.display = isLoggedIn ? 'block' : 'none';
    },

    async manualSync() {
      this.showSyncStatus('同步中...');
      await db.syncToCloud();
    }
  };

  window.app = app;

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => app.init());
  } else {
    app.init();
  }
})();
</script>
<script>
const inspirationModule = {
  inspirations: [],
  editingId: null,
  currentImages: [],

  async init() {
    await this.loadData();
    this.bindEvents();
  },

  async loadData() {
    this.inspirations = await db.getAll('inspirations');
    this.renderList();
  },

  bindEvents() {
    document.getElementById('addInspiration')?.addEventListener('click', () => this.openForm());
    document.getElementById('searchInspiration')?.addEventListener('input', (e) => this.filterList(e.target.value));
    document.getElementById('filterStatus')?.addEventListener('change', () => this.renderList());
  },

  render() {
    return `
      <div class="animate-fade-in">
        <div class="flex-between" style="margin-bottom: 20px;">
          <div class="search-box" style="flex: 1; margin-bottom: 0; margin-right: 16px;">
            <input type="text" id="searchInspiration" placeholder="搜索灵感...">
          </div>
          <select class="form-select" id="filterStatus" style="width: 130px; margin-right: 12px;">
            <option value="">全部状态</option>
            <option value="idea">灵感</option>
            <option value="planning">立项</option>
            <option value="developing">开发中</option>
            <option value="listed">已上架</option>
            <option value="discontinued">已停产</option>
          </select>
          <button class="btn btn-primary" id="addInspiration">新增灵感</button>
        </div>
        <div id="inspirationList" class="inspiration-grid">${this.renderListHTML()}</div>
      </div>
    `;
  },

  renderList() {
    const container = document.getElementById('inspirationList');
    if (container) container.innerHTML = this.renderListHTML();
  },

  renderListHTML() {
    const filterStatus = document.getElementById('filterStatus')?.value || '';
    let items = this.inspirations;
    if (filterStatus) items = items.filter(i => i.status === filterStatus);
    items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    if (items.length === 0) return this.renderEmpty();
    return items.map(item => this.renderItem(item)).join('');
  },

  renderEmpty() {
    return `
      <div class="empty-state" style="grid-column: span 2;">
        <h3>还没有灵感记录</h3>
        <p>记录你的第一个创意想法吧</p>
        <button class="btn btn-primary" onclick="app.modules.inspiration.openForm()">添加灵感</button>
      </div>
    `;
  },

  renderItem(item) {
    const statusMap = {
      idea: { text: '灵感', cls: 'status-idea' },
      planning: { text: '立项', cls: 'status-planning' },
      developing: { text: '开发中', cls: 'status-developing' },
      listed: { text: '已上架', cls: 'status-listed' },
      discontinued: { text: '已停产', cls: 'status-discontinued' }
    };
    const s = statusMap[item.status] || statusMap.idea;
    const firstImage = item.images?.[0] || '';
    const hasImages = item.images && item.images.length > 0;
    const tags = item.tags?.slice(0, 2) || [];

    return `
      <div class="inspiration-card" onclick="app.modules.inspiration.openForm(${item.id})">
        <!-- 图片区域：正方形大图 -->
        ${hasImages
          ? `<img src="${firstImage}" class="inspiration-card-image" alt="${item.name}" loading="lazy">`
          : `<div class="inspiration-card-no-image">创意</div>`
        }
        <!-- 信息区域 -->
        <div class="inspiration-card-body">
          <div class="inspiration-card-header">
            <h3 class="inspiration-card-title">${item.name}</h3>
          </div>
          ${tags.length > 0 ? `
            <div class="inspiration-card-tags">
              ${tags.map(t => `<span class="tag tag-primary">${t}</span>`).join('')}
            </div>
          ` : ''}
          <div class="inspiration-card-footer">
            <span class="inspiration-card-price">${app.formatMoney(item.price || 0)}</span>
            <span class="inspiration-card-date">${app.formatDate(item.createdAt, 'MM-DD')}</span>
          </div>
        </div>
      </div>
    `;
  },

  filterList(query) {
    const q = query.toLowerCase();
    const items = this.inspirations.filter(i =>
      i.name?.toLowerCase().includes(q) ||
      i.description?.toLowerCase().includes(q) ||
      i.tags?.some(t => t.toLowerCase().includes(q))
    );
    const container = document.getElementById('inspirationList');
    if (container) container.innerHTML = items.length ? items.map(item => this.renderItem(item)).join('') : this.renderEmpty();
  },

  openForm(id = null) {
    this.editingId = id;
    const item = id ? this.inspirations.find(i => i.id === id) : null;
    this.currentImages = item?.images ? [...item.images] : [];

    const content = `
      <form id="inspirationForm" onsubmit="event.preventDefault(); app.modules.inspiration.save();">
        <div class="form-group">
          <label class="form-label">灵感名称 *</label>
          <input type="text" class="form-input" id="formName" value="${item?.name || ''}" placeholder="例如：心脏形状热缩片拨片" required>
        </div>
        <div class="form-group">
          <label class="form-label">产品描述</label>
          <textarea class="form-textarea" id="formDesc" placeholder="描述这个创意...">${item?.description || ''}</textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group">
            <label class="form-label">状态</label>
            <select class="form-select" id="formStatus">
              <option value="idea" ${item?.status === 'idea' ? 'selected' : ''}>灵感</option>
              <option value="planning" ${item?.status === 'planning' ? 'selected' : ''}>立项</option>
              <option value="developing" ${item?.status === 'developing' ? 'selected' : ''}>开发中</option>
              <option value="listed" ${item?.status === 'listed' ? 'selected' : ''}>已上架</option>
              <option value="discontinued" ${item?.status === 'discontinued' ? 'selected' : ''}>已停产</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">优先级 (1-5)</label>
            <select class="form-select" id="formPriority">
              ${[1,2,3,4,5].map(n => `<option value="${n}" ${item?.priority == n ? 'selected' : ''}>${'★'.repeat(n)}${'☆'.repeat(5-n)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group">
            <label class="form-label">预估售价</label>
            <input type="number" class="form-input" id="formPrice" value="${item?.price || ''}" placeholder="100">
          </div>
          <div class="form-group">
            <label class="form-label">预估成本</label>
            <input type="number" class="form-input" id="formCost" value="${item?.cost || ''}" placeholder="30">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">标签（用逗号分隔）</label>
          <input type="text" class="form-input" id="formTags" value="${item?.tags?.join(', ') || ''}" placeholder="热缩片, 异形, 手工">
        </div>
        <div class="form-group">
          <label class="form-label">参考图片</label>
          <div class="image-upload" onclick="document.getElementById('formImages').click()">
            <input type="file" id="formImages" accept="image/*" multiple onchange="app.modules.inspiration.handleImageUpload(this)">
            <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">点击上传图片，支持多张</div>
          </div>
          <div class="image-preview" id="imagePreview">
            ${this.currentImages.map(img => `<img src="${img}" class="image-preview-item" onclick="event.stopPropagation(); app.viewImage('${img}')">`).join('')}
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">灵感来源/参考链接</label>
          <input type="text" class="form-input" id="formSource" value="${item?.source || ''}" placeholder="例如：小红书@某博主">
        </div>
      </form>
    `;

    const footer = id
      ? `<button class="btn btn-danger" onclick="app.modules.inspiration.delete()">删除</button><div style="flex:1"></div><button class="btn btn-secondary" onclick="app.closeModal()">取消</button><button class="btn btn-primary" onclick="app.modules.inspiration.save()">保存</button>`
      : `<button class="btn btn-secondary" onclick="app.closeModal()">取消</button><button class="btn btn-primary" onclick="app.modules.inspiration.save()">创建</button>`;

    app.showModal(content, { title: id ? '编辑灵感' : '新增灵感', footer });
  },

  async handleImageUpload(input) {
    const files = Array.from(input.files);
    const preview = document.getElementById('imagePreview');
    for (const file of files) {
      const base64 = await app.fileToBase64(file);
      this.currentImages.push(base64);
      const img = document.createElement('img');
      img.src = base64;
      img.className = 'image-preview-item';
      img.onclick = (e) => { e.stopPropagation(); app.viewImage(base64); };
      preview.appendChild(img);
    }
    input.value = '';
  },

  async save() {
    const name = document.getElementById('formName').value.trim();
    if (!name) { app.showToast('请填写灵感名称'); return; }

    const data = {
      name,
      description: document.getElementById('formDesc').value,
      status: document.getElementById('formStatus').value,
      priority: parseInt(document.getElementById('formPriority').value),
      price: parseFloat(document.getElementById('formPrice').value) || 0,
      cost: parseFloat(document.getElementById('formCost').value) || 0,
      tags: document.getElementById('formTags').value.split(',').map(t => t.trim()).filter(Boolean),
      images: this.currentImages || [],
      source: document.getElementById('formSource').value
    };

    try {
      if (this.editingId) {
        data.id = this.editingId;
        await db.update('inspirations', data);
        app.showToast('灵感已更新');
      } else {
        await db.add('inspirations', data);
        app.showToast('灵感已创建');
      }
      app.closeModal();
      await this.loadData();
    } catch (err) {
      console.error('保存失败:', err);
      app.showToast('保存失败');
    }
  },

  async delete() {
    if (!confirm('确定要删除这个灵感吗？')) return;
    try {
      await db.delete('inspirations', this.editingId);
      app.showToast('灵感已删除');
      app.closeModal();
      await this.loadData();
    } catch (err) {
      app.showToast('删除失败');
    }
  }
};

app.registerModule('inspiration', inspirationModule);

</script>

              <option value="手环" ${item?.category === '手环' ? 'selected' : ''}>手环</option>
              <option value="首饰" ${item?.category === '首饰' ? 'selected' : ''}>首饰</option>
              <option value="其他" ${item?.category === '其他' ? 'selected' : ''}>其他</option>

          </div>
          <div class="form-group">
            <label class="form-label">状态</label>
            <select class="form-select" id="formStatus">
              <option value="designing" ${item?.status === 'designing' ? 'selected' : ''}>设计中</option>
              <option value="sampling" ${item?.status === 'sampling' ? 'selected' : ''}>打样中</option>
              <option value="confirmed" ${item?.status === 'confirmed' ? 'selected' : ''}>已确认</option>
              <option value="producing" ${item?.status === 'producing' ? 'selected' : ''}>大货生产</option>

        <h4 style="font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase;">规格参数</h4>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group">
            <label class="form-label">材质</label>
            <input type="text" class="form-input" id="formMaterial" value="${item?.material || ''}" placeholder="例如：热缩片">

          <div class="form-group">
            <label class="form-label">尺寸</label>

              <option value="滴胶" ${item?.process === '滴胶' ? 'selected' : ''}>滴胶</option>
              <option value="树脂" ${item?.process === '树脂' ? 'selected' : ''}>树脂</option>

          <div class="form-group">
            <label class="form-label">打样次数</label>
            <input type="number" class="form-input" id="formSampleCount" value="${item?.sampleCount || 0}" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">打样厂家</label>
            <input type="text" class="form-input" id="formSampleFactory" value="${item?.sampleFactory || ''}" placeholder="厂家名称">

          <label class="form-label">打样修改记录</label>
          <textarea class="form-textarea" id="formSampleNotes" placeholder="记录每次打样的问题和修改意见...">${item?.sampleNotes || ''}</textarea>

          <label class="form-label">样品照片</label>
          <div class="image-upload" onclick="document.getElementById('formSampleImages').click()">
            <input type="file" id="formSampleImages" accept="image/*" multiple onchange="app.modules.product.handleSampleImageUpload(this)">
            <div style="font-size: 13px; color: var(--text-muted);">点击上传样品照片</div>
          </div>
          <div class="image-preview" id="sampleImagePreview">
            ${this.currentSampleImages.map(img => `<img src="${img}" class="image-preview-item" onclick="event.stopPropagation(); app.viewImage('${img}')">`).join('')}
          </div>
        </div>
      </form>
    `;

    const footer = id
      ? `<button class="btn btn-danger" onclick="app.modules.product.delete()">删除</button><div style="flex:1"></div><button class="btn btn-secondary" onclick="app.closeModal()">取消</button><button class="btn btn-primary" onclick="app.modules.product.save()">保存</button>`
      : `<button class="btn btn-secondary" onclick="app.closeModal()">取消</button><button class="btn btn-primary" onclick="app.modules.product.save()">创建</button>`;

    app.showModal(content, { title: id ? '编辑产品' : '新建产品', footer });
  },

  async handleImageUpload(input) {
    const files = Array.from(input.files);
    const preview = document.getElementById('designImagePreview');
    for (const file of files) {
      const base64 = await app.fileToBase64(file);
      this.currentDesignImages.push(base64);
      const img = document.createElement('img');
      img.src = base64; img.className = 'image-preview-item';
      img.onclick = (e) => { e.stopPropagation(); app.viewImage(base64); };
      preview.appendChild(img);
    }
    input.value = '';
  },

  async handleSampleImageUpload(input) {
    const files = Array.from(input.files);
    const preview = document.getElementById('sampleImagePreview');
    for (const file of files) {
      const base64 = await app.fileToBase64(file);
      this.currentSampleImages.push(base64);
      const img = document.createElement('img');
      img.src = base64; img.className = 'image-preview-item';
      img.onclick = (e) => { e.stopPropagation(); app.viewImage(base64); };
      preview.appendChild(img);
    }
    input.value = '';
  },

  async save() {
    const name = document.getElementById('formName').value.trim();
    if (!name) { app.showToast('请填写产品名称'); return; }

    const data = {
      name, category: document.getElementById('formCategory').value,
      status: document.getElementById('formStatus').value,
      material: document.getElementById('formMaterial').value,
      size: document.getElementById('formSize').value,
      thickness: document.getElementById('formThickness').value,
      process: document.getElementById('formProcess').value,
      description: document.getElementById('formDesc').value,
      designImages: this.currentDesignImages || [],
      sampleCount: parseInt(document.getElementById('formSampleCount').value) || 0,
      sampleFactory: document.getElementById('formSampleFactory').value,
      sampleNotes: document.getElementById('formSampleNotes').value,
      sampleImages: this.currentSampleImages || []
    };

    try {
      if (this.editingId) { data.id = this.editingId; await db.update('products', data); app.showToast('产品已更新'); }
      else { await db.add('products', data); app.showToast('产品已创建'); }
      app.closeModal(); await this.loadData();
    } catch (err) { console.error(err); app.showToast('保存失败'); }
  },

  async delete() {
    if (!confirm('确定要删除这个产品吗？')) return;
    try { await db.delete('products', this.editingId); app.showToast('产品已删除'); app.closeModal(); await this.loadData(); }
    catch (err) { app.showToast('删除失败'); }
  }
};

app.registerModule('product', productModule);

</script>
<script>
const supplierModule = {
  suppliers: [],
  editingId: null,
  currentImages: [],

  async init() {
    await this.loadData();
    this.bindEvents();
  },

  async loadData() {
    this.suppliers = await db.getAll('suppliers');
    this.renderList();
  },

  bindEvents() {
    document.getElementById('addSupplier')?.addEventListener('click', () => this.openForm());
    document.getElementById('searchSupplier')?.addEventListener('input', (e) => this.filterList(e.target.value));
  },

  render() {
    return `
      <div class="animate-fade-in">
        <div class="flex-between" style="margin-bottom: 20px;">
          <div class="search-box" style="flex: 1; margin-bottom: 0; margin-right: 16px;">
            <input type="text" id="searchSupplier" placeholder="搜索供应商...">
          </div>
          <button class="btn btn-primary" id="addSupplier">新增供应商</button>
        </div>
        <div id="supplierList" class="list-container">${this.renderListHTML()}</div>
      </div>
    `;
  },

  renderList() {
    const container = document.getElementById('supplierList');
    if (container) container.innerHTML = this.renderListHTML();
  },

  renderListHTML() {
    if (this.suppliers.length === 0) return this.renderEmpty();
    return this.suppliers.map(item => this.renderItem(item)).join('');
  },

  renderEmpty() {
    return `
      <div class="empty-state">
        <h3>还没有供应商记录</h3>
        <p>记录你的厂家和材料供应商信息</p>
        <button class="btn btn-primary" onclick="app.modules.supplier.openForm()">添加供应商</button>
      </div>
    `;
  },

  renderItem(item) {
    const typeMap = { factory: '批发定制', material: '材料', packaging: '包装', logistics: '物流', other: '其他' };
    const stars = '★'.repeat(item.rating || 0) + '☆'.repeat(5 - (item.rating || 0));
    return `
      <div class="list-item" onclick="app.modules.supplier.openForm(${item.id})">
        <div class="list-item-content">
          <div class="flex-between" style="margin-bottom: 6px;">
            <h3 class="list-item-title">${item.name}</h3>
            <span class="tag tag-primary">${typeMap[item.type] || item.type}</span>
          </div>
          <p class="list-item-desc">${item.platform || ''} | ${item.contact || ''} | ${item.phone || ''}</p>
          <div class="list-item-meta">
            <span style="color: var(--accent-silver-solid); font-size: 13px;">${stars}</span>
            ${item.minOrder ? `<span class="tag">起订: ${item.minOrder}</span>` : ''}
            ${item.leadTime ? `<span class="tag">交期: ${item.leadTime}</span>` : ''}
          </div>
        </div>
        <div class="list-item-actions">
          ${item.url ? `<button class="btn-icon" onclick="event.stopPropagation(); window.open('${item.url}', '_blank')">外链</button>` : ''}
        </div>
      </div>
    `;
  },

  filterList(query) {
    const q = query.toLowerCase();
    const items = this.suppliers.filter(s => s.name?.toLowerCase().includes(q) || s.platform?.toLowerCase().includes(q) || s.contact?.toLowerCase().includes(q));
    const container = document.getElementById('supplierList');
    if (container) container.innerHTML = items.length ? items.map(item => this.renderItem(item)).join('') : this.renderEmpty();
  },

  openForm(id = null) {
    this.editingId = id;
    const item = id ? this.suppliers.find(s => s.id === id) : null;
    this.currentImages = item?.images ? [...item.images] : [];

    const content = `
      <form id="supplierForm" onsubmit="event.preventDefault(); app.modules.supplier.save();">
        <div class="form-group">
          <label class="form-label">供应商名称 *</label>
          <input type="text" class="form-input" id="formName" value="${item?.name || ''}" placeholder="例如：XX工艺品厂" required>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group">
            <label class="form-label">类型</label>
            <select class="form-select" id="formType">
              <option value="factory" ${item?.type === 'factory' ? 'selected' : ''}>批发定制</option>
              <option value="material" ${item?.type === 'material' ? 'selected' : ''}>材料</option>
              <option value="packaging" ${item?.type === 'packaging' ? 'selected' : ''}>包装</option>
              <option value="logistics" ${item?.type === 'logistics' ? 'selected' : ''}>物流</option>
              <option value="other" ${item?.type === 'other' ? 'selected' : ''}>其他</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">平台</label>
            <input type="text" class="form-input" id="formPlatform" value="${item?.platform || ''}" placeholder="例如：1688">
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group"><label class="form-label">联系人</label><input type="text" class="form-input" id="formContact" value="${item?.contact || ''}"></div>
          <div class="form-group"><label class="form-label">联系电话</label><input type="text" class="form-input" id="formPhone" value="${item?.phone || ''}"></div>
        </div>
        <div class="form-group"><label class="form-label">店铺链接</label><input type="text" class="form-input" id="formUrl" value="${item?.url || ''}" placeholder="链接地址"></div>
        <div class="form-group"><label class="form-label">地址</label><input type="text" class="form-input" id="formAddress" value="${item?.address || ''}"></div>
        <div class="divider"></div>
        <h4 style="font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase;">报价信息</h4>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group"><label class="form-label">起订量</label><input type="text" class="form-input" id="formMinOrder" value="${item?.minOrder || ''}" placeholder="例如：100个"></div>
          <div class="form-group"><label class="form-label">单价</label><input type="number" class="form-input" id="formUnitPrice" value="${item?.unitPrice || ''}"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group"><label class="form-label">打样费</label><input type="number" class="form-input" id="formSampleCost" value="${item?.sampleCost || ''}"></div>
          <div class="form-group"><label class="form-label">模具费</label><input type="number" class="form-input" id="formMoldCost" value="${item?.moldCost || ''}"></div>
        </div>
        <div class="form-group"><label class="form-label">交货周期</label><input type="text" class="form-input" id="formLeadTime" value="${item?.leadTime || ''}" placeholder="例如：7-15天"></div>
        <div class="divider"></div>
        <h4 style="font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase;">合作评价</h4>
        <div class="form-group">
          <label class="form-label">评分 (1-5)</label>
          <select class="form-select" id="formRating">
            ${[1,2,3,4,5].map(n => `<option value="${n}" ${item?.rating == n ? 'selected' : ''}>${'★'.repeat(n)}${'☆'.repeat(5-n)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">合作评价</label><textarea class="form-textarea" id="formNotes" placeholder="质量、服务、交期等评价...">${item?.notes || ''}</textarea></div>
        <div class="form-group">
          <label class="form-label">报价单/合同照片</label>
          <div class="image-upload" onclick="document.getElementById('formImages').click()">
            <input type="file" id="formImages" accept="image/*" multiple onchange="app.modules.supplier.handleImageUpload(this)">
            <div style="font-size: 13px; color: var(--text-muted);">点击上传</div>
          </div>
          <div class="image-preview" id="imagePreview">
            ${this.currentImages.map(img => `<img src="${img}" class="image-preview-item" onclick="event.stopPropagation(); app.viewImage('${img}')">`).join('')}
          </div>
        </div>
      </form>
    `;

    const footer = id
      ? `<button class="btn btn-danger" onclick="app.modules.supplier.delete()">删除</button><div style="flex:1"></div><button class="btn btn-secondary" onclick="app.closeModal()">取消</button><button class="btn btn-primary" onclick="app.modules.supplier.save()">保存</button>`
      : `<button class="btn btn-secondary" onclick="app.closeModal()">取消</button><button class="btn btn-primary" onclick="app.modules.supplier.save()">创建</button>`;

    app.showModal(content, { title: id ? '编辑供应商' : '新增供应商', footer });
  },

  async handleImageUpload(input) {
    const files = Array.from(input.files);
    const preview = document.getElementById('imagePreview');
    for (const file of files) {
      const base64 = await app.fileToBase64(file);
      this.currentImages.push(base64);
      const img = document.createElement('img');
      img.src = base64; img.className = 'image-preview-item';
      img.onclick = (e) => { e.stopPropagation(); app.viewImage(base64); };
      preview.appendChild(img);
    }
    input.value = '';
  },

  async save() {
    const name = document.getElementById('formName').value.trim();
    if (!name) { app.showToast('请填写供应商名称'); return; }
    const data = {
      name, type: document.getElementById('formType').value,
      platform: document.getElementById('formPlatform').value,
      contact: document.getElementById('formContact').value,
      phone: document.getElementById('formPhone').value,
      url: document.getElementById('formUrl').value,
      address: document.getElementById('formAddress').value,
      minOrder: document.getElementById('formMinOrder').value,
      unitPrice: parseFloat(document.getElementById('formUnitPrice').value) || 0,
      sampleCost: parseFloat(document.getElementById('formSampleCost').value) || 0,
      moldCost: parseFloat(document.getElementById('formMoldCost').value) || 0,
      leadTime: document.getElementById('formLeadTime').value,
      rating: parseInt(document.getElementById('formRating').value) || 3,
      notes: document.getElementById('formNotes').value,
      images: this.currentImages || []
    };
    try {
      if (this.editingId) { data.id = this.editingId; await db.update('suppliers', data); app.showToast('供应商已更新'); }
      else { await db.add('suppliers', data); app.showToast('供应商已创建'); }
      app.closeModal(); await this.loadData();
    } catch (err) { console.error(err); app.showToast('保存失败'); }
  },

  async delete() {
    if (!confirm('确定要删除这个供应商吗？')) return;
    try { await db.delete('suppliers', this.editingId); app.showToast('供应商已删除'); app.closeModal(); await this.loadData(); }
    catch (err) { app.showToast('删除失败'); }
  }
};

app.registerModule('supplier', supplierModule);

</script>

                  <div class="flex-between" style="padding-top: 8px; border-top: 1px solid var(--border-color); margin-top: 8px;"><span style="font-weight: 600;">总成本</span><span id="hTotal" style="font-weight: 600; color: var(--text-primary);">¥0.00</span></div>
                  <div class="flex-between"><span style="color: var(--text-secondary);">单件利润</span><span id="hProfit" style="color: #82e0aa;">¥0.00</span></div>

                  <div class="flex-between" style="padding-top: 8px; border-top: 1px solid var(--border-color); margin-top: 8px;"><span style="color: var(--text-secondary);">月利润预估</span><span id="hMonProfit" style="font-weight: 700; color: var(--accent-silver-solid);">¥0.00</span></div>
                </div>
              </div>
            </div>
          </div>
          <div class="card" style="margin-bottom: 0;">
            <div class="card-header"><h3 class="card-title">批发制品成本</h3></div>
            <div id="wholesaleCalc">
              <div class="form-group"><label class="form-label">产品名称</label><select class="form-select" id="wProduct"><option value="">选择产品</option>${this.products.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="form-group"><label class="form-label">产品单价</label><input type="number" class="form-input" id="wUnit" placeholder="5.00" oninput="app.modules.calculator.calcW()"></div>

              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="form-group"><label class="form-label">模具费</label><input type="number" class="form-input" id="wMold" placeholder="500" oninput="app.modules.calculator.calcW()"></div>
